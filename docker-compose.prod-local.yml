version: '3.8'

services:
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend-api

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      APP_ENV: production
      DATABASE_URL: postgresql://qdra:qdra@postgres:5432/qdra
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8080
      JWT_SECRET_KEY: local-production-test-secret-change-me
      RUN_MIGRATIONS_ON_STARTUP: "true"
      IMAGE_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_BASE_URL: http://localhost:9000
      S3_BUCKET: qdra-images
      S3_ACCESS_KEY_ID: qdra
      S3_SECRET_ACCESS_KEY: qdra-password
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      - postgres
      - redis
      - minio

  plan-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      PYTHONUNBUFFERED: "1"
      APP_ENV: production
      DATABASE_URL: postgresql://qdra:qdra@postgres:5432/qdra
      WORKER_CONCURRENCY: "1"
      JWT_SECRET_KEY: local-production-test-secret-change-me
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: qdra
      POSTGRES_USER: qdra
      POSTGRES_PASSWORD: qdra
    ports:
      - "5433:5432"
    volumes:
      - postgres_prod_local_data:/var/lib/postgresql/data
      - ./backend/docker/postgres-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: qdra
      MINIO_ROOT_PASSWORD: qdra-password
    volumes:
      - minio_prod_local_data:/data

volumes:
  postgres_prod_local_data:
  minio_prod_local_data:
