services:

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend-api

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://qdra:qdra@postgres:5432/qdra
      REDIS_URL: redis://redis:6379/0
      GRAPH_JOB_QUEUE: graph_reasoning_jobs
      QDRA_IMAGE_STORAGE_BACKEND: local
      QDRA_LOCAL_STORAGE_ROOT: ./uploads
      QDRA_MAX_IMAGE_SIZE_MB: 5
      QDRA_ALLOWED_IMAGE_MIME_TYPES: image/png,image/jpeg,image/webp
    volumes:
      - qdra_uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  graph-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://qdra:qdra@postgres:5432/qdra
      REDIS_URL: redis://redis:6379/0
      GRAPH_JOB_QUEUE: graph_reasoning_jobs
      WORKER_CONCURRENCY: 1
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: qdra
      POSTGRES_USER: qdra
      POSTGRES_PASSWORD: qdra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  qdra_uploads:
