services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./frontend/.env
    depends_on:
      - backend-api

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://qdra:qdra@postgres:5432/qdra
      REDIS_URL: redis://redis:6379/0
      GRAPH_JOB_QUEUE: graph_reasoning_jobs
      IMAGE_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_BASE_URL: http://localhost:9000
      S3_BUCKET: qdra-images
      S3_ACCESS_KEY_ID: qdra
      S3_SECRET_ACCESS_KEY: qdra-password
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: true
    depends_on:
      - postgres
      - redis
      - minio

  graph-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://qdra:qdra@postgres:5432/qdra
      REDIS_URL: redis://redis:6379/0
      GRAPH_JOB_QUEUE: graph_reasoning_jobs
      WORKER_CONCURRENCY: 1
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: qdra
      POSTGRES_USER: qdra
      POSTGRES_PASSWORD: qdra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: qdra
      MINIO_ROOT_PASSWORD: qdra-password
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  qdra_uploads:
  minio_data:
